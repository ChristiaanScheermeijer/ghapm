version: 2

project_name: ghapm

before:
  hooks:
    - go test ./...

builds:
  - id: ghapm
    main: .
    binary: ghapm
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/christiaanscheermeijer/ghapm/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: ghapm
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: github-native
