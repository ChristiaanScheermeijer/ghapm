name: Workflow file with floating refs

on:
  workflow_dispatch:

jobs:
  do-something:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ghapm:v4
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ghapm:v4
        with:
          node-version: "22.x"
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Start server
        run: yarn start &
      - name: Composite action
        uses: ./.github/actions/composite
      - name: Uploading artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ghapm:v4
        with:
          name: allure-report-${{ matrix.config }}
          path: ./output
          retention-days: 7
      - name: Post Slack Message
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # ghapm:v2
        if: ${{ failure() && github.event_name == 'schedule' }}
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            "repository": "${{ github.repository }}",
            "workflow": "${{ github.workflow }}",
            "ref": "${{ github.ref }}",
            "ref_name": "${{ github.ref_name }}",
            "event_name": "${{ github.event_name }}",
            "run_id": "${{ github.run_id }}",
            "status": "${{ job.status }}",
            "runner": "${{ runner.name }}",
